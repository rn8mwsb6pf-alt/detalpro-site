<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'unsafe-inline'">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 480px;
      height: 300px;
      overflow: hidden;
      background: transparent;
      -webkit-app-region: drag;
    }

    .card {
      width: 100%;
      height: 100%;
      background: #0d0f10;
      border: 1px solid #2a2f33;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      font-family: 'Segoe UI', sans-serif;
      color: #e8eaeb;
    }

    .logo {
      font-size: 2.6rem;
      font-weight: 800;
      letter-spacing: .12em;
      color: #e8411a;
      text-transform: uppercase;
    }

    .tagline {
      font-size: .85rem;
      color: #9da5ab;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .bar-track {
      width: 200px;
      height: 3px;
      background: #1a1d20;
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 40%;
      background: #e8411a;
      border-radius: 2px;
      animation: slide 1.4s ease-in-out infinite;
    }

    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(600%); }
    }

    .version {
      font-size: .7rem;
      color: #3d4549;
      letter-spacing: .04em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Garage</div>
    <div class="tagline">Дорожный комплекс Гараж</div>
    <div class="bar-track">
      <div class="bar-fill"></div>
    </div>
    <div class="version">Загрузка…</div>
  </div>
</body>
</html>
